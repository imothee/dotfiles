# tmux base — portable half of imothee/dotfiles (PUBLIC, no company refs).
# Catppuccin frappe to match starship. Per-host powerbar is sourced from
# ~/.config/tmux/local.conf (private, provisioned per box — never in this repo).
# Read natively from ~/.config/tmux/tmux.conf (tmux >= 3.1).

### prefix: Ctrl-f (send-prefix on f; double-tap = last window)
unbind C-b
set -g prefix C-f
bind f send-prefix
bind C-f last-window

### general
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g status-keys vi
setw -g mode-keys vi
set -g bell-action any
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
# NOTE: default-shell is per-host (fish path differs by OS) -> set in local.conf

### reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

### splits / windows in cwd
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

### vim pane nav + resize
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

### broadcast toggle (e on / E off) — send input to all panes
bind e setw synchronize-panes on
bind E setw synchronize-panes off

### copy-mode (vi): v begin selection, y yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

### ---- catppuccin frappe status (BASE; local.conf overrides status-right) ----
set -g status on
set -g status-interval 15
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#292c3c,fg=#c6d0f4"

# left: session name (mauve) with powerline cap
set -g status-left "#[fg=#232634,bg=#ca9ee6,bold] #S #[fg=#ca9ee6,bg=#292c3c] "
set -g status-left-length 30

# windows as tabs
setw -g window-status-format "#[fg=#737994] #I #W "
setw -g window-status-current-format "#[fg=#8caaee,bg=#292c3c]#[fg=#232634,bg=#8caaee,bold] #I #W #[fg=#8caaee,bg=#292c3c]"
setw -g window-status-separator ""

# right: base fallback = host + clock (private powerbar replaces this)
set -g status-right "#[fg=#737994]#[fg=#232634,bg=#737994] #H #[fg=#8caaee,bg=#737994]#[fg=#232634,bg=#8caaee,bold] %H:%M "
set -g status-right-length 160

# panes / messages / mode
set -g pane-border-style "fg=#414559"
set -g pane-active-border-style "fg=#8caaee"
set -g message-style "bg=#414559,fg=#c6d0f4"
setw -g mode-style "bg=#51576d,fg=#c6d0f4"

### ---- plugins (tpm) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

### ---- per-host PRIVATE powerbar overlay (not in this public repo) ----
if-shell "[ -f ~/.config/tmux/local.conf ]" "source ~/.config/tmux/local.conf"

### init tpm — keep last
run '~/.config/tmux/plugins/tpm/tpm'
